# Deploy: Backoffice admin
# Domínio produção: backoffice.vilablackrabbit.com.br  →  Nginx  →  127.0.0.1:4173  →  PM2 backoffice-front
# NÃO mexe em outros PM2 nem reinicia nginx (reload global removido por segurança).

name: Deploy Backoffice VPS (backoffice.vilablackrabbit.com.br)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    env:
      VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/root/backoffice-black-rabbit' }}
      VPS_APP_PORT: ${{ vars.VPS_APP_PORT || '4173' }}
      PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'backoffice-front' }}
      PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN || 'backoffice.vilablackrabbit.com.br' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar .env temporario
        if: ${{ vars.DOTENV_FILE != '' }}
        run: |
          cat > .env <<'EOF'
          ${{ vars.DOTENV_FILE }}
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build Vite (no runner, evita OOM na VPS)
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build

      - name: Compactar dist
        run: tar -czf build.tar.gz -C dist .

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          sed -i 's/\r$//' ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Enviar artefatos para VPS
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            SSH_PORT="${{ secrets.PORT }}"
            [ -z "$SSH_PORT" ] && SSH_PORT="22"
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/deploy_key -p "$SSH_PORT" \
              "${{ secrets.USERNAME }}@${{ secrets.HOST }}" 'mkdir -p /tmp/br-backoffice-deploy'
            scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/deploy_key -P "$SSH_PORT" \
              build.tar.gz ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/tmp/br-backoffice-deploy/
            if [ -f .env ]; then
              scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/deploy_key -P "$SSH_PORT" \
                .env ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/tmp/br-backoffice-deploy/
            fi

      - name: Deploy na VPS (somente backoffice-front)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            export PATH="/root/.local/share/fnm:/root/.local/share/fnm/current/bin:$PATH"
            eval "$(/root/.local/share/fnm/fnm env)"
            fnm use --install-if-missing 22

            APP_DIR="${{ env.VPS_APP_DIR }}"
            APP_PORT="${{ env.VPS_APP_PORT }}"
            PM2_NAME="${{ env.PM2_APP_NAME }}"
            DOMAIN="${{ env.PRODUCTION_DOMAIN }}"

            if ss -lntp | grep -q ":${APP_PORT} "; then
              OWNER="$(ss -lntp | grep ":${APP_PORT} " || true)"
              if ! echo "${OWNER}" | grep -q "${PM2_NAME}"; then
                echo "Porta ${APP_PORT} ocupada por outro processo:"
                echo "${OWNER}"
                exit 1
              fi
            fi

            mkdir -p "${APP_DIR}/dist"
            rm -rf "${APP_DIR}/dist"/*
            tar -xzf /tmp/br-backoffice-deploy/build.tar.gz -C "${APP_DIR}/dist"
            if [ -f /tmp/br-backoffice-deploy/.env ]; then
              cp -f /tmp/br-backoffice-deploy/.env "${APP_DIR}/.env"
            fi
            rm -rf /tmp/br-backoffice-deploy

            if [ ! -f "${APP_DIR}/dist/index.html" ]; then
              echo "dist/index.html nao encontrado"
              exit 1
            fi

            cd "${APP_DIR}"
            pm2 delete "${PM2_NAME}" >/dev/null 2>&1 || true
            pm2 start "npx serve -s dist -l ${APP_PORT} --no-clipboard" --name "${PM2_NAME}"
            pm2 save

            curl -sf "http://127.0.0.1:${APP_PORT}/" >/dev/null
            echo "Deploy OK: ${DOMAIN} ja aponta nginx -> 127.0.0.1:${APP_PORT}"
            pm2 list | grep "${PM2_NAME}" || true
